<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>제46회 장애인의 날 4.20 챌린지</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --bg-color: #0c433c;
            --accent-green: #a4fc66;
            --point-color: #f7b731;
            --expert-purple: #a55eea; /* 고수 모드 포인트 컬러 */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 10% 20%, rgba(164, 252, 102, 0.1) 0%, transparent 40%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; color: #fff; padding: 20px;
        }

        .container {
            background: rgba(12, 67, 60, 0.95);
            width: 100%; max-width: 420px; padding: 2.5rem 1.5rem;
            border-radius: 35px; box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); position: relative;
        }

        .logo-area img { width: 60%; max-width: 180px; margin-bottom: 1rem; }

        .title-section h1 { font-size: 1.4rem; font-weight: 800; margin: 0; line-height: 1.4; }
        .title-section h1 span { color: var(--point-color); }

        /* 모드 선택기 */
        .mode-selector { display: flex; background: rgba(0,0,0,0.4); border-radius: 20px; padding: 6px; margin: 1.5rem 0; }
        .mode-btn {
            flex: 1; padding: 12px 5px; border: none; border-radius: 15px; cursor: pointer;
            font-weight: 700; transition: 0.3s; background: none; color: #666; font-size: 0.9rem;
        }
        .mode-btn.active.normal { background: #008170; color: #fff; }
        .mode-btn.active.expert { background: var(--expert-purple); color: #fff; }

        /* 타이머 */
        .timer-display {
            background: #000; border-radius: 25px; padding: 2.5rem 0.5rem; margin-bottom: 2rem;
            border: 4px solid #2a2a2a; transition: border-color 0.3s;
        }
        #timer {
            font-size: 5.5rem; font-weight: 900; color: var(--point-color);
            font-variant-numeric: tabular-nums; letter-spacing: -4px;
        }

        /* 메인 버튼 */
        .btn-main {
            width: 100%; padding: 1.4rem; font-size: 1.6rem; font-weight: 900;
            border: none; border-radius: 25px; cursor: pointer;
            background: linear-gradient(135deg, var(--accent-green), var(--point-color));
            color: #0c433c; box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .btn-main.stop { background: #ff4757; color: #fff; }

        /* 성공 오버레이 */
        #successOverlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); border-radius: 35px; z-index: 100;
            flex-direction: column; justify-content: center; align-items: center; padding: 2rem;
        }
        .success-icon { font-size: 4rem; margin-bottom: 1rem; }
        .tag-box {
            background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px;
            font-size: 0.85rem; color: var(--accent-green); line-height: 1.8; margin-top: 15px;
            word-break: break-all; text-align: left;
        }

        .timer-msg { font-size: 0.8rem; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area"><img src="logo.jpg" alt="로고"></div>
    <div class="title-section">
        <h1 id="modeTitle">4.20초 <span>일반 모드</span></h1>
    </div>

    <div class="mode-selector">
        <button id="mN" class="mode-btn active normal" onclick="setM('normal')">일반 모드<br><small>±0.5초 보정</small></button>
        <button id="mE" class="mode-btn" onclick="setM('expert')">고수 모드<br><small>보정 없음!</small></button>
    </div>

    <div class="timer-display" id="tBox">
        <div id="timer">0.00</div>
        <div id="expertTag" style="display:none; color:var(--expert-purple); font-weight:bold; margin-top:5px;">[EXPERT MODE]</div>
    </div>

    <button id="mainBtn" class="btn-main" onclick="handle()">챌린지 시작!</button>
    <div style="margin-top:15px; font-size:0.8rem; color:#888; text-decoration:underline;" onclick="location.reload()">다시 하기</div>

    <div id="successOverlay">
        <div class="success-icon">🏆</div>
        <h2 id="winTitle">성공을 축하합니다!</h2>
        <p style="font-size:0.9rem; line-height:1.6;">장애인의 날을 기억해주셔서 감사합니다.<br><span id="waitMsg"></span></p>
        
        <div id="tagArea" style="display:none;">
            <p style="font-size:0.8rem; color:#fff; margin-bottom:5px;">👇 <b>댓글</b>에 아래 태그를 복사해서 달아주세요!</p>
            <div class="tag-box">
                #남양주시장애인복지관 #4.20챌린지 #고수모드성공 #남양주배리어프리 #스무번의계절_스물한번째약속
            </div>
        </div>
    </div>
</div>

<script>
    // 🔗 폼 주소 설정
    const NORMAL_FORM = "https://naver.me/일반모드주소"; 
    const EXPERT_FORM = "https://naver.me/고수모드주소"; 

    let start, interval, running = false, mode = 'normal';
    const timer = document.getElementById('timer');
    const mainBtn = document.getElementById('mainBtn');
    const overlay = document.getElementById('successOverlay');

    function setM(m) {
        if(running) return;
        mode = m;
        document.getElementById('mN').className = 'mode-btn' + (m==='normal'?' active normal':'');
        document.getElementById('mE').className = 'mode-btn' + (m==='expert'?' active expert':'');
        document.getElementById('modeTitle').innerHTML = m==='normal' ? '4.20초 <span>일반 모드</span>' : '4.20초 <span style="color:var(--expert-purple)">고수 모드</span>';
        document.getElementById('expertTag').style.display = m==='expert' ? 'block' : 'none';
        document.getElementById('tBox').style.borderColor = m==='expert' ? 'var(--expert-purple)' : '#2a2a2a';
    }

    function handle() {
        if(!running) {
            running = true; start = Date.now();
            mainBtn.textContent = 'STOP!'; mainBtn.classList.add('stop');
            interval = setInterval(() => { timer.textContent = ((Date.now()-start)/1000).toFixed(2); }, 10);
        } else {
            running = false; clearInterval(interval);
            check();
        }
    }

    function check() {
        let t = parseFloat(timer.textContent);
        let win = false;

        if(mode === 'normal') {
            if(t >= 3.70 && t <= 4.70) { timer.textContent = "4.20"; win = true; }
        } else {
            if(timer.textContent === "4.20") { win = true; } // 고수는 문자열 그대로 4.20이어야 함 (보정X)
        }

        if(win) {
            timer.style.color = mode === 'normal' ? 'var(--accent-green)' : 'var(--expert-purple)';
            mainBtn.style.visibility = 'hidden';
            
            let waitTime = mode === 'normal' ? 3 : 30; // 일반 3초, 고수 30초
            let count = waitTime;
            
            const waitMsg = document.getElementById('waitMsg');
            waitMsg.textContent = `기록 인증을 위해 ${count}초간 화면이 유지됩니다.`;

            const cd = setInterval(() => {
                count--;
                if(count > 0) waitMsg.textContent = `기록 인증을 위해 ${count}초간 화면이 유지됩니다.`;
                else {
                    clearInterval(cd);
                    if(mode === 'expert') document.getElementById('tagArea').style.display = 'block';
                    overlay.style.display = 'flex';
                    setTimeout(() => { window.location.href = (mode === 'normal' ? NORMAL_FORM : EXPERT_FORM); }, mode === 'normal' ? 2000 : 7000);
                }
            }, 1000);
        } else {
            timer.style.color = '#ff4757';
            mainBtn.textContent = '다시 도전!'; mainBtn.classList.remove('stop');
        }
    }
</script>
</body>
</html>
