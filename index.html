<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>제46회 장애인의 날 4.20 챌린지 - 남양주시장애인복지관</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <style>
        :root {
            --nyj-blue: #00569f; --nyj-sky: #00a4e4; --nyj-green: #68b030;
            --nyj-yellow: #f7b731; --nyj-gray-bg: #f4f7f9; --app-card-bg: #ffffff;
            --expert-purple: #a55eea; --perfect-gold: #fff200;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--nyj-gray-bg); background-image: linear-gradient(180deg, rgba(0, 86, 159, 0.1) 0%, rgba(244, 247, 249, 0) 50%), radial-gradient(circle at 10% 20%, rgba(0, 164, 228, 0.05) 0%, transparent 20%), radial-gradient(circle at 90% 80%, rgba(104, 176, 48, 0.05) 0%, transparent 20%); color: #333; user-select: none; overflow-x: hidden; min-height: 100vh; transition: background-color 0.4s; }
        body.fail-bg { background: #ffebee !important; background-image: none !important; }

        header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px); padding: 1rem; display: flex; justify-content: center; align-items: center; position: fixed; top: 0; width: 100%; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.05); border-bottom: 2px solid var(--nyj-blue); }
        header img { height: 40px; width: auto; }

        .app-container { max-width: 480px; margin: 0 auto; padding: 7rem 1.5rem 3rem; text-align: center; background: var(--app-card-bg); border-radius: 40px; box-shadow: 0 15px 50px rgba(0,0,0,0.08); border: 1px solid rgba(0,0,0,0.03); margin-top: 6rem; }
        .title-area { margin-bottom: 2.5rem; border-bottom: 1px solid #eee; padding-bottom: 1.5rem; }
        .title-area h2 { font-size: 1.1rem; color: var(--nyj-sky); font-weight: 700; margin-bottom: 8px; }
        .title-area h1 { font-size: 2.1rem; font-weight: 900; color: var(--nyj-blue); letter-spacing: -1.2px; }
        .title-area span { color: var(--nyj-green); }

        .mode-selector { display: flex; background: #eee; border-radius: 50px; padding: 5px; margin: 0 auto 2rem; max-width: 350px; }
        .mode-btn { flex: 1; padding: 12px; border: none; border-radius: 50px; cursor: pointer; font-weight: 700; transition: 0.3s; background: none; color: #777; font-size: 0.9rem; }
        .mode-btn.active.normal { background: var(--nyj-blue); color: #fff; }
        .mode-btn.active.expert { background: var(--expert-purple); color: #fff; }

        .stopwatch-wrapper { background: #111827; width: 240px; height: 240px; margin: 0 auto 2.5rem; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 10px solid #2d3748; box-shadow: 0 20px 40px rgba(0,0,0,0.15), inset 0 0 30px rgba(0,0,0,0.6); position: relative; }
        #timer { font-size: 4.5rem; font-weight: 900; color: var(--nyj-sky); font-variant-numeric: tabular-nums; letter-spacing: -2px; text-shadow: 0 0 20px rgba(0, 164, 228, 0.5); }

        .btn-main { width: 100%; max-width: 350px; padding: 1.3rem; font-size: 1.4rem; font-weight: 800; border: none; border-radius: 50px; cursor: pointer; background: linear-gradient(to right, var(--nyj-blue), var(--nyj-sky)); color: #fff; box-shadow: 0 10px 25px rgba(0, 86, 159, 0.3); transition: transform 0.2s; display: block; margin: 0 auto; }
        .btn-main.stop { background: #ff4757 !important; }

        #captureUI { display: none; background: #e0f2f1; border: 2px dashed var(--nyj-green); padding: 1.2rem; border-radius: 20px; color: var(--nyj-blue); font-weight: bold; margin: -10px auto 0; max-width: 350px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        .leaderboard-section { margin-top: 4rem; padding: 2rem 1rem; }
        .leaderboard-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.03); border: 1px solid #eee; }
        .leaderboard-table th, td { padding: 15px 5px; text-align: center; border-bottom: 1px solid #f1f1f1; font-size: 0.95rem; }

        footer { margin-top: 5rem; padding: 3rem 1.5rem; background: #fff; border-top: 1px solid #eee; text-align: left; color: #666; font-size: 0.85rem; line-height: 1.7; }

        #infoModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 86, 159, 0.6); z-index: 3000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(8px); }
        .modal-content { background: #fff; width: 100%; max-width: 400px; padding: 2.5rem 2rem; border-radius: 35px; box-shadow: 0 25px 60px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.85rem; color: #444; margin-bottom: 6px; font-weight: 700; }
        .input-group input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; background: #f8fafc; }
        .zip-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .btn-zip { background: #4a5568; color: #fff; border: none; border-radius: 12px; padding: 0 15px; font-weight: bold; cursor: pointer; }
        .btn-submit { width: 100%; padding: 17px; background: var(--nyj-green); color: #fff; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 1.1rem; margin-top: 10px; }

        .confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1999; display: none; }
        .confetti-piece { position: absolute; width: 10px; height: 15px; animation: fall 3s linear infinite; }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }
    </style>
</head>
<body>

<header><img src="logo.jpg" alt="남양주시장애인복지관"></header>

<div class="app-container">
    <div class="title-area">
        <h2>"행복한 인연, 향기로운 동행"</h2>
        <h1>제46회 장애인의 날<br><span>4.20 챌린지</span></h1>
    </div>

    <div class="mode-selector">
        <button id="mN" class="mode-btn active normal" onclick="setMode('normal')">일반 모드</button>
        <button id="mE" class="mode-btn" onclick="setMode('expert')">고수 모드</button>
    </div>

    <div class="stopwatch-wrapper"><div id="timer">0.00</div></div>

    <button id="mainBtn" class="btn-main" onclick="handle()">도전 시작!</button>
    <div id="captureUI"><div style="font-size:1.5rem;">📸</div><div id="captureCount"></div></div>
</div>

<div style="max-width:480px; margin:0 auto; padding:0 1.5rem;">
    <div class="leaderboard-section">
        <h3 style="text-align:center; margin-bottom:1.5rem; color:var(--nyj-blue); font-weight:800;">🏆 실시간 고수 랭킹</h3>
        <table class="leaderboard-table">
            <thead><tr><th>순위</th><th>닉네임</th><th>기록</th></tr></thead>
            <tbody id="lBody"><tr><td colspan="3" style="padding:2rem;">랭킹 로드 중...</td></tr></tbody>
        </table>
    </div>
</div>

<footer>
    <p><strong>남양주시장애인복지관</strong></p>
    <p>주소: 경기도 남양주시 홍유릉로 273-1</p>
    <p>전화: 031-592-7150 | 팩스: 031-592-8150</p>
    <p>이메일: nyjwel@nyjwel.or.kr</p>
    <p style="margin-top:0.5rem; opacity:0.8;">Copyright © 남양주시장애인복지관. All rights reserved.</p>
</footer>

<div id="infoModal">
    <div class="modal-content">
        <h3 id="modalTitle" style="color:var(--nyj-blue); margin-bottom:1.5rem; text-align:center; font-weight:900;">🎊 응모 정보 입력 🎊</h3>
        <div class="input-group"><label>성함 (실명)</label><input type="text" id="uName"></div>
        <div class="input-group"><label>연락처</label><input type="tel" id="uPhone" maxlength="13"></div>
        <div class="input-group"><label>주소</label>
            <div class="zip-row"><input type="text" id="uZip" readonly><button class="btn-zip" onclick="openDaumPostcode()">검색</button></div>
            <input type="text" id="uAddr1" readonly style="margin-bottom:8px; background:#f0f0f0;"><input type="text" id="uAddr2" placeholder="상세주소">
        </div>
        <label style="font-size:0.75rem; color:#888; display:flex; align-items:flex-start; margin:20px 0;">
            <input type="checkbox" id="uConsent" style="margin-right:8px; margin-top:2px;">
            <span>[필수] 개인정보 수집 및 활용 동의</span>
        </label>
        <button class="btn-submit" onclick="submitData()">등록 완료</button>
        <button style="width:100%; background:none; border:none; color:#aaa; margin-top:15px; cursor:pointer;" onclick="closeModal()">취소</button>
    </div>
</div>

<div id="confetti" class="confetti"></div>
<script>
    const SCRIPT_URL = "해찬님의_앱스스크립트_URL"; // [중요] 해찬 님의 실제 URL로 교체하세요!

    let start, interval, running = false, failed = false, mode = 'normal';
    const timer = document.getElementById('timer');
    const mainBtn = document.getElementById('mainBtn');
    const captureUI = document.getElementById('captureUI');

    // 연락처 하이픈 자동 생성
    document.getElementById('uPhone').addEventListener('input', function(e) {
        let v = this.value.replace(/[^0-9]/g, '');
        if(v.length > 3 && v.length <= 7) this.value = v.slice(0,3)+'-'+v.slice(3);
        else if(v.length > 7) this.value = v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7);
        else this.value = v;
    });

    function openDaumPostcode() {
        new daum.Postcode({ oncomplete: (d) => {
            document.getElementById('uZip').value = d.zonecode;
            document.getElementById('uAddr1').value = d.address;
            document.getElementById('uAddr2').focus();
        }}).open();
    }

    function loadRanks() {
        fetch(SCRIPT_URL + "?t=" + Date.now()).then(res => res.json()).then(data => {
            const lBody = document.getElementById('lBody');
            lBody.innerHTML = data.map((r, i) => `<tr><td style="font-weight:900; color:var(--nyj-blue);">${i+1}</td><td>${r.name}</td><td style="font-weight:bold;">${r.time}</td></tr>`).join('');
        });
    }

    function setMode(m) {
        if(running) return;
        mode = m;
        document.getElementById('mN').classList.toggle('active', m === 'normal');
        document.getElementById('mE').classList.toggle('active', m === 'expert');
        timer.textContent = m === 'normal' ? "0.00" : "0.000";
        if(failed) resetGame();
    }

    function handle() {
        if(failed) { resetGame(); return; }
        if(!running) {
            running = true; start = Date.now();
            mainBtn.textContent = 'STOP!'; mainBtn.classList.add('stop');
            interval = setInterval(() => {
                const el = (Date.now() - start) / 1000;
                timer.textContent = mode === 'normal' ? el.toFixed(2) : el.toFixed(3);
            }, mode === 'normal' ? 10 : 1);
        } else {
            running = false; clearInterval(interval);
            check();
        }
    }

    function check() {
        let tNum = parseFloat(timer.textContent);
        let win = (mode === 'normal') ? (tNum >= 3.70 && tNum <= 4.70) : (tNum >= 4.100 && tNum <= 4.300);

        if(win) {
            if(mode === 'normal') timer.textContent = "4.20";
            timer.style.textShadow = '0 0 25px rgba(0, 164, 228, 0.8)';
            mainBtn.style.display = 'none'; captureUI.style.display = 'block';
            makeConfetti();

            let wait = mode === 'normal' ? 5 : 15; // [수정] 고수 15초 대기
            const cd = setInterval(() => {
                document.getElementById('captureCount').innerHTML = `지금 화면을 캡처하세요!<br><b>${wait}초</b> 후 등록 창이 뜹니다.`;
                if(wait <= 0) {
                    clearInterval(cd); captureUI.style.display = 'none';
                    document.getElementById('infoModal').style.display = 'flex';
                }
                wait--;
            }, 1000);
        } else {
            failed = true;
            timer.style.color = '#ff4757'; document.body.classList.add('fail-bg');
            mainBtn.textContent = '다시 도전하기 (리셋)'; mainBtn.classList.remove('stop');
        }
    }

    function resetGame() {
        failed = false; document.body.classList.remove('fail-bg');
        timer.style.color = 'var(--nyj-sky)'; timer.textContent = mode === 'normal' ? "0.00" : "0.000";
        mainBtn.textContent = '도전 시작!'; mainBtn.style.display = 'block';
        captureUI.style.display = 'none'; document.getElementById('confetti').style.display = 'none';
    }

    function submitData() {
        const name = document.getElementById('uName').value;
        const phone = document.getElementById('uPhone').value;
        const fullAddr = `[${document.getElementById('uZip').value}] ${document.getElementById('uAddr1').value} ${document.getElementById('uAddr2').value}`;
        const consent = document.getElementById('uConsent').checked;

        if(!name || !phone || !consent) { alert("필수 정보를 입력하세요."); return; }

        const btn = document.querySelector('.btn-submit');
        btn.textContent = "전송 중..."; btn.disabled = true;

        fetch(SCRIPT_URL, {
            method: "POST", mode: "no-cors",
            body: JSON.stringify({ name, phone, address: fullAddr, time: timer.textContent, consent: "동의", mode: mode === 'normal' ? '일반' : '고수' })
        }).then(() => {
            alert("응모가 완료되었습니다!"); closeModal(); loadRanks();
        });
    }

    function makeConfetti() {
        const c = document.getElementById('confetti'); c.style.display = 'block'; c.innerHTML = '';
        for(let i=0; i<100; i++) {
            const p = document.createElement('div'); p.className = 'confetti-piece';
            p.style.left = Math.random()*100+'vw'; p.style.backgroundColor = ['#00a4e4','#00569f','#68b030','#f7b731','#fff'][Math.floor(Math.random()*5)];
            p.style.animationDuration = (Math.random()*2+1)+'s'; c.appendChild(p);
        }
    }

    function closeModal() { document.getElementById('infoModal').style.display = 'none'; resetGame(); }
    window.onload = loadRanks;
</script>
</body>
</html>
