<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제46회 장애인의 날 4.20 챌린지</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --primary: #008170; /* 로고의 메인 청록색 계열 */
            --point: #8db524;   /* 로고의 연두색 계열 */
            --bg: #0f172a;
            --card: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg) url('https://www.transparenttextures.com/patterns/cubes.png');
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; color: #333;
        }

        .container {
            background: var(--card);
            width: 380px; padding: 2rem; border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center; position: relative; overflow: hidden;
            border: 4px solid var(--primary);
        }

        /* 로고 영역 */
        .logo-area { width: 100%; margin-bottom: 1.5rem; }
        .logo-area img { max-width: 250px; height: auto; }

        .main-title { font-size: 1.4rem; font-weight: 800; color: var(--primary); margin-bottom: 0.5rem; line-height: 1.4; }
        .sub-title { font-size: 0.9rem; color: #666; margin-bottom: 1.5rem; }

        /* 모드 선택 스위치 */
        .mode-selector {
            display: flex; background: #eee; border-radius: 50px; padding: 5px; margin-bottom: 2rem;
        }
        .mode-btn {
            flex: 1; padding: 10px; border: none; border-radius: 50px; cursor: pointer;
            font-weight: 700; transition: 0.3s; background: none; color: #888;
        }
        .mode-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* 타이머 전광판 스타일 */
        .timer-box {
            background: #222; border-radius: 20px; padding: 2rem 1rem; margin-bottom: 2rem;
            border: 5px solid #444; box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }
        #timer {
            font-size: 6rem; font-weight: 900; color: #ffcc00;
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.7);
            font-variant-numeric: tabular-nums; letter-spacing: -2px;
        }

        /* 메인 버튼 */
        .btn-main {
            width: 100%; padding: 1.5rem; font-size: 1.5rem; font-weight: 900;
            border: none; border-radius: 25px; cursor: pointer;
            background: linear-gradient(135deg, var(--primary), var(--point));
            color: white; box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: 0.2s; margin-bottom: 1rem;
        }
        .btn-main:active { transform: scale(0.96); }
        .btn-main.stop { background: linear-gradient(135deg, #ff4757, #ff6b81); }

        /* 성공/실패 안내 레이어 */
        #overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 129, 112, 0.95); color: white;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .success-icon { font-size: 5rem; margin-bottom: 1rem; }
        .success-msg { font-size: 1.2rem; font-weight: 700; line-height: 1.6; padding: 0 2rem; }

        .reset-link { color: #aaa; text-decoration: underline; cursor: pointer; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <img src="logo.jpg" alt="남양주시시장애인복지관">
    </div>

    <div class="main-title">"4월 20일, 마음이 닿는 시간"</div>
    
    <div class="mode-selector">
        <button id="normalMode" class="mode-btn active" onclick="setMode('normal')">일반 모드<br><small></small></button>
        <button id="expertMode" class="mode-btn" onclick="setMode('expert')">고수 모드<br><small>완벽한 정지!</small></button>
    </div>

    <div class="timer-box">
        <div id="timer">0.00</div>
    </div>

    <button id="mainBtn" class="btn-main" onclick="handleAction()">챌린지 시작!</button>
    <div class="reset-link" onclick="location.reload()">다시 하기</div>

    <div id="overlay">
        <div class="success-icon">🏆</div>
        <div class="success-msg">
            <span id="modeName">일반 모드</span> 성공!<br>
            4월 20일 장애인의 날을<br>기억해주셔서 감사합니다.
        </div>
        <p style="margin-top:2rem; font-size:0.8rem; opacity:0.8;">잠시 후 응모 폼으로 이동합니다...</p>
    </div>
</div>

<audio id="snd" src="https://cdn.pixabay.com/audio/2021/08/04/audio_062561592c.mp3"></audio>

<script>
    const NAVER_FORM_URL = "https://naver.me/이곳에주소를입력하세요"; 
    let currentMode = 'normal';
    let startTime, timerInterval, running = false;

    const timerDisplay = document.getElementById('timer');
    const mainBtn = document.getElementById('mainBtn');
    const overlay = document.getElementById('overlay');
    const snd = document.getElementById('snd');

    function setMode(mode) {
        if(running) return;
        currentMode = mode;
        document.getElementById('normalMode').classList.toggle('active', mode === 'normal');
        document.getElementById('expertMode').classList.toggle('active', mode === 'expert');
    }

    function handleAction() {
        if (!running) {
            running = true;
            startTime = Date.now();
            mainBtn.textContent = 'STOP!';
            mainBtn.classList.add('stop');
            timerDisplay.style.color = '#ffcc00';
            timerInterval = setInterval(() => {
                timerDisplay.textContent = ((Date.now() - startTime) / 1000).toFixed(2);
            }, 10);
        } else {
            running = false;
            clearInterval(timerInterval);
            checkResult();
        }
    }

    function checkResult() {
        let finalTime = parseFloat(timerDisplay.textContent);
        let success = false;

        if (currentMode === 'normal') {
            // 일반 모드
            if (finalTime >= 3.70 && finalTime <= 4.70) {
                timerDisplay.textContent = "4.20";
                success = true;
            }
        } else {
            // 고수 모드
            if (finalTime === 4.20) {
                success = true;
            }
        }

        if (success) {
            timerDisplay.style.color = '#00ff00';
            mainBtn.style.visibility = 'hidden';
            document.getElementById('modeName').textContent = currentMode === 'normal' ? '일반 모드' : '고수 모드';
            try { snd.play(); } catch(e) {}

            setTimeout(() => {
                overlay.style.display = 'flex';
                setTimeout(() => {
                    window.location.href = NAVER_FORM_URL;
                }, 3000);
            }, 2500);
        } else {
            timerDisplay.style.color = '#ff4757';
            mainBtn.textContent = '실패! 다시 도전';
            mainBtn.classList.remove('stop');
        }
    }
</script>

</body>
</html>
