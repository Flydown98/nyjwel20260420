<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제46회 장애인의 날 4.20 챌린지</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --bg-color: #0c433c;    /* 이미지의 딥 그린 배경 */
            --accent-green: #a4fc66; /* 이미지의 밝은 연두색 포인트 */
            --primary-text: #fff;
            --secondary-text: #008170; /* 이미지 버튼 등의 청록색 */
            --point-color: #f7b731; /* 전광판 및 포스터의 오렌지/골드 */
        }

        body {
            font-family: 'Pretendard', sans-serif;
            /* 이미지의 배경 톤과 곡선 패턴 시뮬레이션 */
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at top left, rgba(164, 252, 102, 0.1) 0%, transparent 50%),
                radial-gradient(circle at bottom right, rgba(247, 183, 49, 0.05) 0%, transparent 40%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; color: var(--primary-text);
            overflow: hidden; /* 스크롤 방지 */
        }

        .container {
            /* 포스터 느낌의 세로형 카드 디자인 */
            background: rgba(12, 67, 60, 0.85); /* 약간 투명한 카드 배경 */
            width: 380px; padding: 2.5rem; border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            text-align: center; position: relative; overflow: hidden;
            border: 5px solid rgba(255,255,255,0.1); /* 미세한 테두리 */
        }

        /* 곡선 리본 데코 (CSS로 구현) */
        .decor-ribbon {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
            background-image: 
                linear-gradient(135deg, transparent 40%, rgba(164, 252, 102, 0.05) 41%, transparent 60%),
                linear-gradient(45deg, transparent 40%, rgba(164, 252, 102, 0.03) 41%, transparent 60%);
        }

        /* 로고 영역 */
        .logo-area { width: 100%; margin-bottom: 2rem; }
        .logo-area img { max-width: 250px; height: auto; display: block; margin: 0 auto;}

        /* 포스터의 메인 슬로건 디자인 */
        .main-title-box {
            margin-bottom: 1.5rem; text-align: left; /* 포스터처럼 왼쪽 정렬 */
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
            padding: 10px; border-radius: 10px;
        }
        .main-title-top { font-size: 0.95rem; font-weight: 500; color: #ccc; margin-bottom: 5px; }
        .main-title { font-size: 1.5rem; font-weight: 900; line-height: 1.4; color: var(--primary-text); text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .main-title span { color: var(--point-color); text-shadow: 0 0 10px rgba(247,183,49,0.5); } /* 4.20초 골드 */

        /* 포스터 하단 서브 텍스트 디자인 */
        .poster-subtext {
            font-size: 0.8rem; color: #bbb; line-height: 1.6; margin-bottom: 2rem; text-align: left; padding-left: 10px; border-left: 2px solid rgba(164, 252, 102, 0.2);
        }

        /* 모드 선택 스위치 */
        .mode-selector {
            display: flex; background: rgba(0,0,0,0.3); border-radius: 50px; padding: 5px; margin-bottom: 2.5rem;
        }
        .mode-btn {
            flex: 1; padding: 12px; border: none; border-radius: 50px; cursor: pointer;
            font-weight: 700; transition: 0.3s; background: none; color: #aaa;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .mode-btn small { font-size: 0.7rem; font-weight: 400; color: #888; }
        
        .mode-btn.active { 
            background: linear-gradient(135deg, #008170, #00564d); color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
        }
        .mode-btn.active small { color: rgba(255,255,255,0.7); }

        /* 타이머 전광판 스타일 */
        .timer-box {
            background: #222; border-radius: 20px; padding: 1.5rem 1rem; margin-bottom: 2rem;
            border: 5px solid #444; box-shadow: inset 0 0 20px rgba(0,0,0,1), 0 0 15px rgba(247, 183, 49, 0.2);
        }
        #timer {
            font-size: 6rem; font-weight: 900; color: var(--point-color);
            text-shadow: 0 0 15px rgba(247, 183, 49, 0.8), 0 0 30px rgba(247, 183, 49, 0.5);
            font-variant-numeric: tabular-nums; letter-spacing: -3px;
        }

        /* 메인 버튼 */
        .btn-main {
            width: 100%; padding: 1.6rem; font-size: 1.6rem; font-weight: 900;
            border: none; border-radius: 25px; cursor: pointer;
            background: linear-gradient(135deg, var(--accent-green), var(--point-color));
            color: #222; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: all 0.2s; margin-bottom: 1.5rem;
        }
        .btn-main:active { transform: scale(0.97); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn-main.stop { background: linear-gradient(135deg, #ff4757, #ff9f43); color: white;}

        /* 성공 안내 레이어 (초기 숨김) */
        #successScreen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(12, 67, 60, 0.98); color: var(--primary-text);
            flex-direction: column; justify-content: center; align-items: center;
            padding: 3rem; box-sizing: border-box; z-index: 100; animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .success-icon { font-size: 6rem; margin-bottom: 1.5rem; color: var(--accent-green); }
        .success-msg { font-size: 1.3rem; font-weight: 700; line-height: 1.6; word-break: keep-all; }
        .loading-dots { margin-top: 2rem; font-size: 1rem; opacity: 0.8; }

        .reset-link { color: #aaa; text-decoration: underline; cursor: pointer; font-size: 0.95rem; font-weight: 500;}
        .reset-link:hover { color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="decor-ribbon"></div>

    <div class="logo-area">
        <img src="logo.jpg" alt="남양주시시장애인복지관">
    </div>

    <div class="main-title-box">
        <div class="main-title-top">제46회 장애인의 날 기념</div>
        <div class="main-title">"4월 20일,<br>마음이 맞닿는 시간 <span>4.20초</span>"</div>
    </div>

    <div class="poster-subtext">
        장애인의 날을 기억하는 가장 즐거운 방법!<br>
        <strong>4.20초 근처</strong>에서 멈춰주세요.<br>
        함께하는 세상, 4.20초의 약속
    </div>
    
    <div class="mode-selector">
        <button id="normalMode" class="mode-btn active" onclick="setMode('normal')">일반 모드<br><small>범위 ±0.5초</small></button>
        <button id="expertMode" class="mode-btn" onclick="setMode('expert')">고수 모드<br><small>완벽한 정지!</small></button>
    </div>

    <div class="timer-box">
        <div id="timer">0.00</div>
    </div>

    <button id="mainBtn" class="btn-main" onclick="handleButtonClick()">챌린지 시작!</button>
    <div class="reset-link" onclick="location.reload()">다시 도전하기</div>

    <div id="successScreen">
        <div class="success-icon">🎉</div>
        <div class="success-msg">
            축하합니다!<br>
            4월 20일 장애인의 날을<br>
            기억해주셔서 감사합니다.
        </div>
        <div class="loading-dots">잠시 후 응모 페이지로 이동합니다...</div>
    </div>
</div>

<audio id="successSound" src="https://cdn.pixabay.com/audio/2021/08/04/audio_062561592c.mp3" preload="auto"></audio>

<script>
    const NAVER_FORM_URL = "https://naver.me/이곳에주소를입력하세요"; 
    let startTime, timerInterval, running = false;
    let currentMode = 'normal';

    const timerDisplay = document.getElementById('timer');
    const mainBtn = document.getElementById('mainBtn');
    const successScreen = document.getElementById('successScreen');
    const successSound = document.getElementById('successSound');

    function setMode(mode) {
        if(running) return; // 실행 중엔 모드 변경 불가
        currentMode = mode;
        document.getElementById('normalMode').classList.toggle('active', mode === 'normal');
        document.getElementById('expertMode').classList.toggle('active', mode === 'expert');
    }

    function handleButtonClick() {
        if (!running) {
            startTimer();
        } else {
            stopTimerAndCheck();
        }
    }

    function startTimer() {
        running = true;
        startTime = Date.now();
        mainBtn.textContent = 'STOP!';
        mainBtn.classList.add('stop');
        timerDisplay.style.color = 'var(--point-color)';
        
        timerInterval = setInterval(() => {
            const elapsedTime = (Date.now() - startTime) / 1000;
            timerDisplay.textContent = elapsedTime.toFixed(2);
        }, 10);
    }

    function stopTimerAndCheck() {
        running = false;
        clearInterval(timerInterval);
        
        let finalTime = parseFloat(timerDisplay.textContent);
        let success = false;

        if (currentMode === 'normal') {
            // [일반 모드] ±0.5초 배리어프리 판정 (3.70 ~ 4.70)
            if (finalTime >= 3.70 && finalTime <= 4.70) {
                timerDisplay.textContent = "4.20"; // 마법처럼 4.20으로 변환
                success = true;
            }
        } else {
            // [고수 모드] 정확히 4.20초
            if (finalTime === 4.20) {
                success = true;
            }
        }

        if (success) {
            timerDisplay.style.color = 'var(--accent-green)'; // 성공 시 연두색 강조
            timerDisplay.style.textShadow = '0 0 15px rgba(164, 252, 102, 0.8), 0 0 30px rgba(164, 252, 102, 0.5)';
            mainBtn.style.visibility = 'hidden'; // 버튼 영역은 유지하되 숨김
            try { successSound.play(); } catch(e) {} // 띠링!

            // 1. 성공한 4.20 화면을 3초간 보여줌 (녹화/인증 시간)
            setTimeout(() => {
                // 2. 초록색 성공 메시지 창으로 전환
                successScreen.style.display = 'flex';
                
                // 3. 2초 더 보여준 뒤 네이버 폼으로 이동
                setTimeout(() => {
                    window.location.href = NAVER_FORM_URL;
                }, 2000);

            }, 3000); 

        } else {
            // 범위 밖일 때
            timerDisplay.style.color = '#ff4757';
            timerDisplay.style.textShadow = '0 0 15px rgba(255, 71, 87, 0.5)';
            mainBtn.textContent = '아쉽네요! 다시 도전';
            mainBtn.classList.remove('stop');
        }
    }
</script>

</body>
</html>
